# Bug Generic borg
- type: borgType
  id: generic_bug

  # Description
  dummyPrototype: BorgChassisGeneric

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleScience #until sciborgs are added

  defaultModules:
  - BorgModuleTool
  - BorgModuleArtifact
  - BorgModuleAnomaly

  lawset: OmuScience # Changed to match the laws of the borgs in non-omu namespace.

  radioChannels:
  - Science

  addComponents: # Goobstation
  - type: Inventory
    templateId: borgNoOffset
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _Omu/Mobs/Species/Cyborgs/displacements.rsi
            state: head

  # Visual
  inventoryTemplateId: borgShort
  spriteBodyState: robot
  spriteHasMindState: robot_e
  spriteNoMindState: robot_e_r
  spriteToggleLightState: robot_l

  # Pet
  petSuccessString: petting-success-generic-cyborg
  petFailureString: petting-failure-generic-cyborg


