# Bug Medical borg
- type: borgType
  id: medical_bug

  # Description
  dummyPrototype: BorgChassisMedical

  # Functional
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical

  defaultModules:
  - BorgModuleTool
  - BorgModuleChemical
  - BorgModuleTopicals
  - BorgModuleRescue
  - BorgModuleSurgery
  - BorgModuleVirology # Omu Viro Module
  - BorgModuleLollypop # Goobstation


  lawset: OmuMedical # Changed to match the laws of the borgs in non-omu namespace.

  radioChannels:
  - Science
  - Medical

  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  - type: Sanitized # Shitmed
  - type: SurgeryTarget # Shitmed
  - type: SurgeryIgnoreClothing
  - type: SurgerySpeedModifier
    speedModifier: 1.5
  - type: Inventory # Goobstation(?) The others had this comment, so i'm putting it here too.
    templateId: borgNoOffset
    displacements:
      head:
        sizeMaps:
          32:
            sprite: _Omu/Mobs/Species/Cyborgs/displacements.rsi
            state: head

  # Visual
  inventoryTemplateId: borgDutch
  spriteBodyState: medical
  spriteHasMindState: medical_e
  spriteNoMindState: medical_e_r
  spriteToggleLightState: medical_l

  # Pet
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

  # Sounds
#  footstepCollection:
#    collection: FootstepHoverBorg  # Omitted, due to having feet.

